name: Build and Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version tags
        id: meta
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build Spring Boot JAR
        working-directory: ./service
        run: mvn clean package -DskipTests

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./service
          platforms: linux/amd64
          push: true
          tags: |
            claytonckob/topicmanager-backend:latest
            claytonckob/topicmanager-backend:${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=claytonckob/topicmanager-backend:buildcache
          cache-to: type=registry,ref=claytonckob/topicmanager-backend:buildcache,mode=max
          build-args: |
            JAR_FILE=target/topicmanager-0.0.1-SNAPSHOT.jar

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build React frontend
        working-directory: ./client
        run: |
          npm ci
          npm run build

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          platforms: linux/amd64
          push: true
          tags: |
            claytonckob/topicmanager-frontend:latest
            claytonckob/topicmanager-frontend:${{ steps.meta.outputs.version }}
          cache-from: type=registry,ref=claytonckob/topicmanager-frontend:buildcache
          cache-to: type=registry,ref=claytonckob/topicmanager-frontend:buildcache,mode=max
